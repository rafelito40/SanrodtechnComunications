<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador de Visitas</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #004aad, #00b4ff);
      color: white;
      text-align: center;
      padding-top: 120px;
      overflow-x: hidden;
    }

    .contador {
      background: rgba(255, 255, 255, 0.1);
      display: inline-block;
      padding: 40px 60px;
      border-radius: 20px;
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
      animation: fadeIn 1.5s ease-out;
    }

    h1 {
      margin-bottom: 15px;
      font-weight: 700;
    }

    #visitas {
      font-size: 3rem;
      animation: pop 1.5s infinite alternate;
    }

    @keyframes pop {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="contador">
    <h1>👥 Visitas a la página</h1>
    <div id="visitas">Cargando...</div>
  </div>

  <script>
    // Usa CountAPI - no necesita servidor
    const namespace = 'sanrodtechn_communications'; // sin espacios ni caracteres especiales
    const key = 'contador_visitas_total';

    fetch(`https://api.countapi.xyz/update/${namespace}/${key}/?amount=1`)
      .then(response => {
        if (!response.ok) throw new Error(`Error HTTP ${response.status}`);
        return response.json();
      })
      .then(data => {
        document.getElementById('visitas').textContent = data.value;
      })
      .catch(error => {
        console.error('Error al obtener visitas:', error);
        document.getElementById('visitas').textContent = 'Error 😢';
      });
  </script>

<!-- SweetAlert2 Bienvenido -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (!sessionStorage.getItem('welcomed')) {
      Swal.fire({
        title: '¡Qué alegría tenerte aquí! 🚀',
        html: 'Estás a un paso de llevar la <b>tecnología</b> de tu hogar y tu negocio al máximo nivel con nosotros.<br><br>Explora nuestras soluciones premium y siéntete como en casa.',
        icon: 'success',
        iconColor: '#00e5ff',
        background: 'rgba(15, 23, 42, 0.95)',
        color: '#e2e8f0',
        confirmButtonColor: '#00e5ff',
        confirmButtonText: '<span style="color:#0f172a; font-weight:800;">Adelante, descubrir</span>',
        backdrop: 'rgba(2, 6, 23, 0.9)',
        showClass: { popup: 'animate__animated animate__zoomIn' }
      });
      sessionStorage.setItem('welcomed', 'true');
    }
  });
</script>
</body>

</html>
